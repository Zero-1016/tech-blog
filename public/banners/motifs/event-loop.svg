<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif">

  <text x="40" y="56" font-size="11" font-weight="700" fill="#e0e7ff" opacity="0.8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">call stack</text>
  <g>
    <rect x="110" y="46" width="120" height="18" rx="2" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
    <rect x="110" y="66" width="120" height="18" rx="2" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="1"/>
    <text x="170" y="79" font-size="10" fill="#c4b5fd" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">run()</text>
    <rect x="110" y="86" width="120" height="18" rx="2" fill="#a78bfa" opacity="0.35" stroke="#a78bfa" stroke-width="1"/>
    <text x="170" y="99" font-size="10" fill="#ede9fe" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">fn()</text>
  </g>

  <path d="M250 95 Q300 95 300 140" stroke="#facc15" stroke-width="1.4" fill="none" opacity="0.7" stroke-dasharray="3 2"/>
  <path d="M296 132 L300 140 L304 132" stroke="#facc15" stroke-width="1.4" fill="none" opacity="0.85"/>

  <text x="40" y="152" font-size="11" font-weight="700" fill="#a78bfa" opacity="0.95" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">microtask</text>
  <text x="40" y="166" font-size="9" fill="#e0e7ff" opacity="0.55">우선</text>
  <g>
    <rect x="110" y="142" width="250" height="30" rx="3" fill="#1e2a52" opacity="0.55" stroke="#a78bfa" stroke-width="1"/>
    <circle cx="126" cy="157" r="6" fill="#a78bfa" opacity="0.95"/>
    <text x="126" y="160" font-size="8" fill="#0f1530" text-anchor="middle" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">μ</text>
    <circle cx="148" cy="157" r="6" fill="#a78bfa" opacity="0.85"/>
    <text x="148" y="160" font-size="8" fill="#0f1530" text-anchor="middle" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">μ</text>
    <circle cx="170" cy="157" r="6" fill="#a78bfa" opacity="0.7"/>
    <text x="170" y="160" font-size="8" fill="#0f1530" text-anchor="middle" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">μ</text>
    <circle cx="192" cy="157" r="6" fill="#a78bfa" opacity="0.55"/>
    <circle cx="214" cy="157" r="6" fill="#a78bfa" opacity="0.4"/>
    <text x="340" y="160" font-size="9" fill="#c4b5fd" text-anchor="end" opacity="0.75" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Promise.then</text>
  </g>

  <path d="M235 172 L235 204" stroke="#facc15" stroke-width="1.4" opacity="0.55" stroke-dasharray="3 2"/>
  <path d="M231 198 L235 206 L239 198" stroke="#facc15" stroke-width="1.4" opacity="0.7" fill="none"/>

  <text x="40" y="226" font-size="11" font-weight="700" fill="#facc15" opacity="0.95" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">task</text>
  <text x="40" y="240" font-size="9" fill="#e0e7ff" opacity="0.55">다음</text>
  <g>
    <rect x="110" y="216" width="250" height="30" rx="3" fill="#1e2a52" opacity="0.5" stroke="#facc15" stroke-width="1"/>
    <rect x="118" y="224" width="42" height="14" rx="2" fill="#facc15" opacity="0.85"/>
    <text x="139" y="234" font-size="9" fill="#0f1530" text-anchor="middle" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">timeout</text>
    <rect x="166" y="224" width="34" height="14" rx="2" fill="#facc15" opacity="0.65"/>
    <text x="183" y="234" font-size="9" fill="#0f1530" text-anchor="middle" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">click</text>
    <rect x="206" y="224" width="44" height="14" rx="2" fill="#facc15" opacity="0.5"/>
    <text x="228" y="234" font-size="9" fill="#0f1530" text-anchor="middle" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">message</text>
    <rect x="256" y="224" width="34" height="14" rx="2" fill="#facc15" opacity="0.35"/>
    <rect x="296" y="224" width="34" height="14" rx="2" fill="#facc15" opacity="0.2"/>
  </g>

  <path d="M235 246 L235 278" stroke="#f472b6" stroke-width="1.4" opacity="0.7" stroke-dasharray="3 2"/>
  <path d="M231 272 L235 280 L239 272" stroke="#f472b6" stroke-width="1.4" opacity="0.85" fill="none"/>

  <text x="40" y="300" font-size="11" font-weight="700" fill="#f472b6" opacity="0.95" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">render</text>
  <text x="40" y="314" font-size="9" fill="#e0e7ff" opacity="0.55">~16ms</text>
  <g>
    <rect x="110" y="290" width="250" height="34" rx="3" fill="#f472b6" opacity="0.15" stroke="#f472b6" stroke-width="1"/>
    <rect x="116" y="296" width="60" height="22" rx="2" fill="#f472b6" opacity="0.55"/>
    <text x="146" y="310" font-size="9" fill="#fce7f3" text-anchor="middle" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">rAF</text>
    <rect x="182" y="296" width="72" height="22" rx="2" fill="#f472b6" opacity="0.4"/>
    <text x="218" y="310" font-size="9" fill="#fce7f3" text-anchor="middle" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">layout</text>
    <rect x="260" y="296" width="90" height="22" rx="2" fill="#f472b6" opacity="0.3"/>
    <text x="305" y="310" font-size="9" fill="#fce7f3" text-anchor="middle" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">paint</text>
  </g>

  <path d="M360 307 Q386 307 386 160 Q386 50 170 50" stroke="#facc15" stroke-width="1.5" opacity="0.7" fill="none"/>
  <path d="M176 44 L166 50 L176 56" stroke="#facc15" stroke-width="1.5" opacity="0.85" fill="none"/>
  <text x="376" y="180" font-size="9" fill="#facc15" text-anchor="middle" opacity="0.75" transform="rotate(-90 376 180)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">loop</text>

  <text x="40" y="368" font-size="10" fill="#e0e7ff" opacity="0.55" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">microtask &gt; task &gt; render</text>

</svg>
